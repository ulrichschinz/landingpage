<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .bg       { fill: #FBF6EE }
    .lines    { stroke: #3D2B5C; opacity: 0.6 }
    .node     { fill: #3D2B5C }
    .node-top { fill: #FF7A6B }
    .node-acc { fill: #F4C84A }
    @media (prefers-color-scheme: dark) {
      .bg       { fill: #3D2B5C }
      .lines    { stroke: #FFFFFF; opacity: 0.75 }
      .node     { fill: #FFFFFF }
      .node-top { fill: #FF7A6B }
      .node-acc { fill: #F4C84A }
    }
  </style>
  <rect width="64" height="64" rx="10" class="bg"/>
  <g class="lines" stroke-width="2" fill="none">
    <line x1="32" y1="14" x2="47.588" y2="23"/>
    <line x1="47.588" y1="23" x2="47.588" y2="41"/>
    <line x1="47.588" y1="41" x2="32" y2="50"/>
    <line x1="32" y1="50" x2="16.412" y2="41"/>
    <line x1="16.412" y1="41" x2="16.412" y2="23"/>
    <line x1="16.412" y1="23" x2="32" y2="14"/>
    <line x1="32" y1="32" x2="32" y2="14"/>
    <line x1="32" y1="32" x2="47.588" y2="23"/>
    <line x1="32" y1="32" x2="47.588" y2="41"/>
    <line x1="32" y1="32" x2="32" y2="50"/>
    <line x1="32" y1="32" x2="16.412" y2="41"/>
    <line x1="32" y1="32" x2="16.412" y2="23"/>
  </g>
  <circle cx="32"     cy="32" r="3.6" class="node"/>
  <circle cx="47.588" cy="23" r="2.8" class="node"/>
  <circle cx="47.588" cy="41" r="2.8" class="node"/>
  <circle cx="32"     cy="50" r="2.8" class="node"/>
  <circle cx="16.412" cy="41" r="2.8" class="node"/>
  <circle cx="16.412" cy="23" r="2.8" class="node"/>
  <circle cx="32"     cy="14" r="4.4" class="node-top"/>
  <circle cx="51.588" cy="19" r="2"   class="node-acc"/>
</svg>
